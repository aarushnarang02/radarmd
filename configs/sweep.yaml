# Weights & Biases sweep: the 60+ experiments behind the reported AUROC.
# Bayesian search over the knobs that move mean AUROC on ChestX-ray14.
#
#   wandb sweep configs/sweep.yaml
#   wandb agent <entity>/radarmd/<sweep_id>
#
# Each trial calls scripts/train.py; wandb passes params as dotted overrides.
program: scripts/train.py
method: bayes
metric:
  name: val/auroc_mean
  goal: maximize

# Early-stop clearly-losing trials to spend the GPU budget on promising ones.
early_terminate:
  type: hyperband
  min_iter: 5

command:
  - ${env}
  - python
  - ${program}
  - "--config"
  - configs/densenet121.yaml
  - ${args_no_hyphens}   # wandb emits "key=value" -> our dotted overrides

parameters:
  model.backbone:
    values: [densenet121, convnext_tiny, convnext_small]
  data.image_size:
    values: [224, 320, 448]
  optim.lr:
    distribution: log_uniform_values
    min: 0.00002
    max: 0.0005
  optim.weight_decay:
    values: [0.00001, 0.0001, 0.001, 0.01]
  optim.warmup_epochs:
    values: [0, 1, 2]
  model.drop_rate:
    values: [0.0, 0.1, 0.2]
  data.batch_size:
    values: [16, 32, 48]
