name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project (CPU torch)
        env:
          # CPU-only torch wheels keep CI fast and small.
          UV_TORCH_BACKEND: cpu
        # All extras so the full suite (interpret + serve) runs in CI.
        run: uv sync --extra dev --extra data --extra interpret --extra serve

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
