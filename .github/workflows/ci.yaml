name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project (CPU torch)
        env:
          # CPU-only torch wheels keep CI fast and small.
          UV_TORCH_BACKEND: cpu
        run: uv pip install --system -e ".[dev,data]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest
